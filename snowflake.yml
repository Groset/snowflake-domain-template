# snowflake.yml — contract document
#
# This file is NOT consumed by any deploy automation. It declares what this
# domain expects Snowflake-Administration to have provisioned before any
# script in this repo will succeed.
#
# Reviewers use this during PR review to confirm dependencies.
# New developers use this during First Steps to know what to request.

domain: <DOMAIN_NAME>                       # e.g. il-customers — short, kebab-case identifier
primary_database: <PRIMARY_DB>              # e.g. IL_Customers — gets {ENV}_ prefix at runtime

schemas:
  - <PRIMARY_SCHEMA>                        # e.g. PUBLIC

# Secondary databases this domain writes into (PL targets, shared databases).
# This repo owns specific schemas inside them.
secondary_databases:
  # - database: PL_DOMO
  #   schemas: [<DOMAIN_NAME>]              # one schema per domain inside shared PL DBs

# Roles used by this repo. All three are account-wide — owned by
# Snowflake-Administration. There are no per-domain WRITER/READER roles.
#
#   DAGSTER_DEV_ROLE   — owns every DEV object. Developers use this role
#                        when running scripts in DEV so ownership stays
#                        consistent across the team (any dev can modify
#                        any DEV object).
#   DAGSTER_PRD_ROLE   — owns every PRD object. Used for DEPLOYMENT to
#                        production — both manual rollouts under this role
#                        and the production Dagster service account run
#                        under it. Day-to-day development does not use it.
#   BSL_DEFAULT_ROLE   — general developer role. Reads from PRD; reads
#                        and writes in DEV. Use this for browsing /
#                        exploring; switch to DAGSTER_DEV_ROLE when
#                        creating objects you want the team to own.
required_roles:
  - DAGSTER_DEV_ROLE
  - DAGSTER_PRD_ROLE
  - BSL_DEFAULT_ROLE

default_warehouse: COMPUTE_WH               # change per domain if needed
